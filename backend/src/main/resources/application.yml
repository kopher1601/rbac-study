spring:
  application:
    name: authz
  datasource:
    url: jdbc:h2:mem:authzdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  # 시드는 data.sql 이 아니라 자바 시더(DataSeeder, CommandLineRunner)로 일원화한다.
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG
